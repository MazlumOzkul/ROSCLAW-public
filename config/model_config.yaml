# ROSClaw Model Konfigurasyonu
# Hangi gorev hangi modele gider

models:
  coder:
    provider: ollama
    model: qwen2.5-coder:7b
    base_url: "${OLLAMA_BASE_URL}"
    temperature: 0.1
    max_tokens: 2048

  reflex:
    provider: ollama
    model: gemma4:e4b
    base_url: "${OLLAMA_BASE_URL}"
    temperature: 0.05
    max_tokens: 512

  frontier:
    provider: anthropic
    model: claude-sonnet-5
    fallback: coder           # internet yoksa coder'a dus

routing:
  complexity_threshold: 0.7  # bu skorun ustu frontier'e gider
  require_internet: true      # frontier icin internet zorunlu mu
  max_retries: 5             # AOR dongusu maksimum deneme

skill_library:
  db_path: "./skills/robot_skills.json"
  similarity_threshold: 0.75
  embedding_model: "BAAI/bge-small-en-v1.5"

rag:
  db_path: "./skills/knowledge_base"
  chunk_size: 500
  top_k: 3
